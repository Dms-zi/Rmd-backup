# Xaringan 테스트

.small.muted
이 문서는 단일 Rmd로 동작하는 최소 테스트 덱입니다.

---

# 목표

- R Markdown → HTML 슬라이드 생성 확인
- 코드 청크 렌더 확인
- 플롯/테이블/수식 표시 확인
- (선택) 이미지 로딩 확인

---

# 간단한 R 코드

아래는 랜덤 샘플 데이터 요약입니다.


``` r
set.seed(42)
x &lt;- rnorm(100)
summary(x)
```

```
##     Min.  1st Qu.   Median     Mean  3rd Qu.     Max. 
## -2.99309 -0.61669  0.08980  0.03251  0.66156  2.28665
```

---

# 간단한 플롯


``` r
hist(x, main = "Histogram of x", xlab = "x")
```

![](test_files/figure-html/unnamed-chunk-2-1.png)&lt;!-- --&gt;

# 테이블 출력


``` r
df &lt;- data.frame(
  id = 1:5,
  value = round(rnorm(5), 3)
)
knitr::kable(df)
```



| id|  value|
|--:|------:|
|  1|  1.201|
|  2|  1.045|
|  3| -1.003|
|  4|  1.848|
|  5| -0.667|

# 수식

인라인 수식 예: `\(\mu\)`, `\(\sigma\)`  

블록 수식 예:

$$
\hat{\mu} = \frac{1}{n}\sum_{i=1}^n x_i
$$
